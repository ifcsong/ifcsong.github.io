<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>4 x 4 儿童数独</title>
  <style>
    :root {
      --ink: #1f2937;
      --muted: #64748b;
      --paper: #fffdf7;
      --panel: #ffffff;
      --line: #374151;
      --soft-line: #cbd5e1;
      --sun: #ffd166;
      --mint: #72d6a3;
      --sky: #86c5ff;
      --rose: #ff8fab;
      --bad: #ef4444;
      --good: #16a34a;
      --focus: #2563eb;
      font-family: ui-rounded, "SF Pro Rounded", "Nunito", "Comic Sans MS", system-ui, sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      background:
        radial-gradient(circle at 14% 12%, rgba(255, 209, 102, .42) 0 120px, transparent 121px),
        radial-gradient(circle at 85% 18%, rgba(134, 197, 255, .36) 0 140px, transparent 141px),
        linear-gradient(135deg, #fff8df 0%, #f0fff8 48%, #fff4f8 100%);
    }

    .page {
      width: min(100%, 980px);
      margin: 0 auto;
      padding: 22px;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      gap: 18px;
      margin-bottom: 18px;
    }

    h1 {
      margin: 0 0 6px;
      font-size: clamp(2rem, 5vw, 3.5rem);
      line-height: 1;
      letter-spacing: 0;
    }

    .subtitle {
      margin: 0;
      color: var(--muted);
      font-size: 1.05rem;
      font-weight: 700;
    }

    .mascot {
      flex: 0 0 auto;
      width: 112px;
      height: 112px;
    }

    main {
      display: grid;
      grid-template-columns: minmax(300px, 1fr) 310px;
      gap: 20px;
      align-items: start;
    }

    .game-area,
    .side {
      background: rgba(255, 255, 255, .82);
      border: 2px solid rgba(55, 65, 81, .12);
      border-radius: 8px;
      box-shadow: 0 12px 30px rgba(31, 41, 55, .12);
    }

    .game-area {
      padding: clamp(14px, 3vw, 24px);
    }

    .board-wrap {
      width: min(100%, 560px);
      margin: 0 auto;
    }

    .board {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      aspect-ratio: 1;
      width: 100%;
      background: var(--line);
      border: 5px solid var(--line);
      border-radius: 8px;
      overflow: hidden;
      gap: 2px;
    }

    .cell {
      position: relative;
      display: grid;
      place-items: center;
      min-width: 0;
      border: 0;
      background: var(--panel);
      color: var(--ink);
      font: 900 clamp(2.4rem, 11vw, 5rem) / 1 ui-rounded, "SF Pro Rounded", system-ui, sans-serif;
      cursor: pointer;
      transition: transform .12s ease, background .12s ease, box-shadow .12s ease;
    }

    .cell:nth-child(2),
    .cell:nth-child(6),
    .cell:nth-child(10),
    .cell:nth-child(14) {
      border-right: 4px solid var(--line);
    }

    .cell:nth-child(n+5):nth-child(-n+8) {
      border-bottom: 4px solid var(--line);
    }

    .cell.fixed {
      background: #e8f5ff;
      color: #0f4c81;
      cursor: default;
    }

    .cell.selected {
      z-index: 1;
      background: #fff6bf;
      box-shadow: inset 0 0 0 5px var(--focus);
    }

    .cell.same {
      background: #f3fbff;
    }

    .cell.wrong {
      color: var(--bad);
      background: #fff1f2;
      animation: wiggle .22s ease-in-out 2;
    }

    .cell.correct:not(.fixed) {
      color: var(--good);
    }

    .cell.empty::after {
      content: "";
      width: 14%;
      height: 14%;
      border-radius: 50%;
      background: var(--soft-line);
      opacity: .6;
    }

    @keyframes wiggle {
      0%, 100% { transform: translateX(0); }
      35% { transform: translateX(-4px); }
      70% { transform: translateX(4px); }
    }

    .side {
      padding: 16px;
    }

    .status {
      min-height: 86px;
      padding: 14px;
      border-radius: 8px;
      background: #fff8df;
      border: 2px solid rgba(255, 209, 102, .8);
    }

    .status strong {
      display: block;
      font-size: 1.22rem;
      margin-bottom: 4px;
    }

    .status span {
      color: var(--muted);
      font-weight: 800;
    }

    .numbers {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      margin: 16px 0;
    }

    .num-btn,
    .tool-btn {
      min-height: 58px;
      border: 0;
      border-radius: 8px;
      color: var(--ink);
      font-weight: 900;
      cursor: pointer;
      box-shadow: inset 0 -4px 0 rgba(31, 41, 55, .15);
      transition: transform .12s ease, filter .12s ease;
    }

    .num-btn {
      font-size: 2rem;
    }

    .num-btn:nth-child(1) { background: var(--sun); }
    .num-btn:nth-child(2) { background: var(--mint); }
    .num-btn:nth-child(3) { background: var(--sky); }
    .num-btn:nth-child(4) { background: var(--rose); }

    .num-btn:hover,
    .tool-btn:hover {
      filter: brightness(1.04);
      transform: translateY(-1px);
    }

    .num-btn:active,
    .tool-btn:active {
      transform: translateY(2px);
      box-shadow: inset 0 -2px 0 rgba(31, 41, 55, .16);
    }

    .tools {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .tool-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      min-width: 0;
      padding: 0 10px;
      background: #f1f5f9;
      font-size: 1rem;
    }

    .tool-btn.primary {
      grid-column: span 2;
      background: #d9f99d;
    }

    .icon {
      width: 22px;
      height: 22px;
      flex: 0 0 auto;
    }

    .hearts {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin: 16px 0;
      padding: 12px;
      background: #f8fafc;
      border-radius: 8px;
      border: 2px solid #e2e8f0;
      font-weight: 900;
    }

    .heart-row {
      display: flex;
      gap: 6px;
    }

    .heart {
      width: 22px;
      height: 22px;
      color: var(--rose);
    }

    .hint {
      margin: 14px 0 0;
      color: var(--muted);
      font-size: .98rem;
      font-weight: 800;
      line-height: 1.45;
    }

    .win {
      position: fixed;
      inset: 0;
      display: none;
      place-items: center;
      padding: 20px;
      background: rgba(15, 23, 42, .42);
    }

    .win.show {
      display: grid;
    }

    .win-box {
      width: min(92vw, 420px);
      padding: 24px;
      text-align: center;
      background: #ffffff;
      border-radius: 8px;
      border: 4px solid var(--sun);
      box-shadow: 0 20px 60px rgba(15, 23, 42, .28);
    }

    .win-box svg {
      width: 96px;
      height: 96px;
    }

    .win-box h2 {
      margin: 8px 0;
      font-size: 2rem;
      letter-spacing: 0;
    }

    .win-box p {
      margin: 0 0 18px;
      color: var(--muted);
      font-weight: 800;
    }

    @media (max-width: 820px) {
      header {
        align-items: center;
      }

      .mascot {
        width: 82px;
        height: 82px;
      }

      main {
        grid-template-columns: 1fr;
      }

      .side {
        order: -1;
      }
    }

    @media (max-width: 460px) {
      .page {
        padding: 14px;
      }

      header {
        gap: 10px;
      }

      .subtitle {
        font-size: .95rem;
      }

      .cell {
        font-size: clamp(2rem, 18vw, 4rem);
      }

      .tool-btn {
        font-size: .92rem;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <header>
      <div>
        <h1>4 x 4 数独</h1>
        <p class="subtitle">每一行、每一列、每个小方块，都放 1、2、3、4。</p>
      </div>
      <svg class="mascot" viewBox="0 0 120 120" aria-hidden="true">
        <circle cx="60" cy="60" r="54" fill="#ffd166"/>
        <path d="M28 58c0-23 15-38 32-38s32 15 32 38-14 42-32 42-32-19-32-42Z" fill="#fffdf7" stroke="#1f2937" stroke-width="5"/>
        <circle cx="48" cy="56" r="5" fill="#1f2937"/>
        <circle cx="72" cy="56" r="5" fill="#1f2937"/>
        <path d="M48 76c8 8 16 8 24 0" fill="none" stroke="#1f2937" stroke-width="5" stroke-linecap="round"/>
        <path d="M28 38 18 25M92 38l10-13" stroke="#1f2937" stroke-width="5" stroke-linecap="round"/>
        <circle cx="18" cy="25" r="7" fill="#ff8fab"/>
        <circle cx="102" cy="25" r="7" fill="#72d6a3"/>
      </svg>
    </header>

    <main>
      <section class="game-area" aria-label="数独棋盘">
        <div class="board-wrap">
          <div class="board" id="board"></div>
        </div>
      </section>

      <aside class="side">
        <div class="status" aria-live="polite">
          <strong id="statusTitle">选一个空格吧</strong>
          <span id="statusText">再点下面的数字填进去。</span>
        </div>

        <div class="hearts">
          <span>小星星</span>
          <div class="heart-row" id="hearts"></div>
        </div>

        <div class="numbers" aria-label="数字选择">
          <button class="num-btn" data-number="1">1</button>
          <button class="num-btn" data-number="2">2</button>
          <button class="num-btn" data-number="3">3</button>
          <button class="num-btn" data-number="4">4</button>
        </div>

        <div class="tools">
          <button class="tool-btn" id="eraseBtn">
            <svg class="icon" viewBox="0 0 24 24" aria-hidden="true">
              <path d="M4 15 14 5a3 3 0 0 1 4 4L8 19H4v-4Z" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linejoin="round"/>
              <path d="m11 8 5 5M8 19h12" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"/>
            </svg>
            擦掉
          </button>
          <button class="tool-btn" id="restartBtn">
            <svg class="icon" viewBox="0 0 24 24" aria-hidden="true">
              <path d="M4 12a8 8 0 1 0 2.3-5.7M4 4v6h6" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            重来
          </button>
          <button class="tool-btn primary" id="newBtn">
            <svg class="icon" viewBox="0 0 24 24" aria-hidden="true">
              <path d="M12 3 14.7 8.7 21 9.5l-4.6 4.4 1.1 6.1L12 17l-5.5 3 1.1-6.1L3 9.5l6.3-.8L12 3Z" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linejoin="round"/>
            </svg>
            换一个题目
          </button>
        </div>

        <p class="hint">小窍门：先找一行里少了哪个数字，再看看同一列能不能放它。</p>
      </aside>
    </main>
  </div>

  <div class="win" id="win">
    <div class="win-box" role="dialog" aria-modal="true" aria-labelledby="winTitle">
      <svg viewBox="0 0 120 120" aria-hidden="true">
        <circle cx="60" cy="60" r="52" fill="#d9f99d"/>
        <path d="M32 63 51 82l38-45" fill="none" stroke="#16a34a" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <h2 id="winTitle">完成啦！</h2>
      <p>每一行、每一列都很棒。</p>
      <button class="tool-btn primary" id="winNewBtn">再玩一局</button>
    </div>
  </div>

  <script>
    const puzzles = [
      {
        puzzle: [
          [1, 0, 0, 4],
          [0, 4, 1, 0],
          [2, 0, 0, 3],
          [0, 3, 2, 0]
        ],
        answer: [
          [1, 2, 3, 4],
          [3, 4, 1, 2],
          [2, 1, 4, 3],
          [4, 3, 2, 1]
        ]
      },
      {
        puzzle: [
          [0, 4, 1, 0],
          [1, 0, 0, 4],
          [0, 1, 4, 0],
          [4, 0, 0, 1]
        ],
        answer: [
          [2, 4, 1, 3],
          [1, 3, 2, 4],
          [3, 1, 4, 2],
          [4, 2, 3, 1]
        ]
      },
      {
        puzzle: [
          [0, 1, 0, 4],
          [4, 0, 1, 0],
          [0, 4, 0, 1],
          [1, 0, 4, 0]
        ],
        answer: [
          [2, 1, 3, 4],
          [4, 3, 1, 2],
          [3, 4, 2, 1],
          [1, 2, 4, 3]
        ]
      }
    ];

    const boardEl = document.getElementById("board");
    const heartsEl = document.getElementById("hearts");
    const statusTitle = document.getElementById("statusTitle");
    const statusText = document.getElementById("statusText");
    const winEl = document.getElementById("win");
    const numberButtons = [...document.querySelectorAll(".num-btn")];

    let puzzleIndex = 0;
    let puzzle;
    let values;
    let fixed;
    let selected = null;
    let stars = 3;

    function cloneGrid(grid) {
      return grid.map(row => [...row]);
    }

    function startGame(index = puzzleIndex) {
      puzzleIndex = index % puzzles.length;
      puzzle = puzzles[puzzleIndex];
      values = cloneGrid(puzzle.puzzle);
      fixed = puzzle.puzzle.map(row => row.map(Boolean));
      selected = null;
      stars = 3;
      winEl.classList.remove("show");
      setStatus("选一个空格吧", "再点下面的数字填进去。");
      renderBoard();
      renderStars();
    }

    function renderStars() {
      heartsEl.innerHTML = "";
      for (let i = 0; i < 3; i += 1) {
        const star = document.createElementNS("http://www.w3.org/2000/svg", "svg");
        star.setAttribute("class", "heart");
        star.setAttribute("viewBox", "0 0 24 24");
        star.setAttribute("aria-hidden", "true");
        star.innerHTML = '<path d="M12 3 14.5 8.3 20 9l-4 3.9.9 5.6L12 15.8 7.1 18.5 8 12.9 4 9l5.5-.7L12 3Z" fill="currentColor"/>';
        star.style.opacity = i < stars ? "1" : ".2";
        heartsEl.appendChild(star);
      }
    }

    function renderBoard() {
      boardEl.innerHTML = "";
      const selectedValue = selected ? values[selected.row][selected.col] : 0;

      values.flat().forEach((value, index) => {
        const row = Math.floor(index / 4);
        const col = index % 4;
        const button = document.createElement("button");
        button.className = "cell";
        button.type = "button";
        button.setAttribute("aria-label", `第 ${row + 1} 行，第 ${col + 1} 列`);
        button.dataset.row = row;
        button.dataset.col = col;

        if (value === 0) {
          button.classList.add("empty");
        } else {
          button.textContent = value;
          if (!fixed[row][col] && value === puzzle.answer[row][col]) {
            button.classList.add("correct");
          }
        }

        if (fixed[row][col]) {
          button.classList.add("fixed");
        }

        if (selected && selected.row === row && selected.col === col) {
          button.classList.add("selected");
        } else if (selectedValue && value === selectedValue) {
          button.classList.add("same");
        }

        button.addEventListener("click", () => selectCell(row, col));
        boardEl.appendChild(button);
      });
    }

    function selectCell(row, col) {
      selected = { row, col };
      if (fixed[row][col]) {
        setStatus("这是提示数字", "蓝色格子已经给好了，找白色空格试试。");
      } else if (values[row][col]) {
        setStatus("可以换答案", "点一个数字，或者点“擦掉”。");
      } else {
        setStatus("选好了", "现在点 1、2、3、4 里的一个。");
      }
      renderBoard();
    }

    function setStatus(title, text) {
      statusTitle.textContent = title;
      statusText.textContent = text;
    }

    function fillNumber(number) {
      if (!selected) {
        setStatus("先选空格", "点棋盘上的白色格子。");
        return;
      }

      const { row, col } = selected;
      if (fixed[row][col]) {
        setStatus("这个不能改", "蓝色格子是小提示。");
        return;
      }

      values[row][col] = number;
      renderBoard();

      const cell = boardEl.children[row * 4 + col];
      if (number === puzzle.answer[row][col]) {
        setStatus("答对了", "继续找下一个空格。");
        checkWin();
      } else {
        stars = Math.max(0, stars - 1);
        renderStars();
        cell.classList.add("wrong");
        setStatus("再想一想", "看看这一行、这一列有没有重复。");
      }
    }

    function eraseSelected() {
      if (!selected) {
        setStatus("先选空格", "点一个你想擦掉的白色格子。");
        return;
      }

      const { row, col } = selected;
      if (fixed[row][col]) {
        setStatus("这个不能擦", "蓝色格子是题目给的。");
        return;
      }

      values[row][col] = 0;
      setStatus("擦干净了", "可以重新试一个数字。");
      renderBoard();
    }

    function checkWin() {
      const done = values.every((row, rowIndex) =>
        row.every((value, colIndex) => value === puzzle.answer[rowIndex][colIndex])
      );

      if (done) {
        setTimeout(() => winEl.classList.add("show"), 260);
      }
    }

    numberButtons.forEach(button => {
      button.addEventListener("click", () => fillNumber(Number(button.dataset.number)));
    });

    document.getElementById("eraseBtn").addEventListener("click", eraseSelected);
    document.getElementById("restartBtn").addEventListener("click", () => startGame(puzzleIndex));
    document.getElementById("newBtn").addEventListener("click", () => startGame(puzzleIndex + 1));
    document.getElementById("winNewBtn").addEventListener("click", () => startGame(puzzleIndex + 1));

    document.addEventListener("keydown", event => {
      if (/^[1-4]$/.test(event.key)) {
        fillNumber(Number(event.key));
      }
      if (event.key === "Backspace" || event.key === "Delete") {
        eraseSelected();
      }
    });

    startGame();
  </script>
</body>
</html>
